<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERLINSMKT - Cotizador App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0c1427; color: #e2e8f0; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .gold-gradient { background: linear-gradient(135deg, #fbbf24, #d97706); color: #0f172a; }
        .input-field { background: #1e293b; border: 1.5px solid #334155; border-radius: 12px; padding: 12px 16px; width: 100%; outline: none; transition: all 0.2s; }
        .input-field:focus { border-color: #fbbf24; box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2); }
        .service-card { transition: transform 0.2s, background 0.2s; }
        .service-card.selected { background: rgba(251, 191, 36, 0.15); border-color: #fbbf24; }
        .service-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4">
    <div class="app-container space-y-6">
        <!-- App Header -->
        <div class="flex items-center justify-between pt-4">
            <div>
                <h1 class="text-2xl font-bold text-white">✦ MERLINSMKT</h1>
                <p class="text-xs text-gray-400">Marketing Digital & Transformación</p>
            </div>
            <div class="h-12 w-12 rounded-full gold-gradient flex items-center justify-center shadow-lg">
                <i class="fas fa-magic text-xl"></i>
            </div>
        </div>

        <!-- Calculator Section -->
        <section class="space-y-4">
            <h2 class="text-lg font-semibold flex items-center gap-2">
                <i class="fas fa-calculator text-yellow-500"></i> Calculadora de Servicios
            </h2>
            <div id="services-grid" class="grid grid-cols-1 gap-3">
                <!-- Dynamic Content -->
            </div>
            <div class="glass-card p-4 flex justify-between items-center shadow-2xl">
                <div>
                    <p class="text-xs text-gray-400">Presupuesto Total</p>
                    <p id="total-display" class="text-2xl font-bold text-yellow-500">$0</p>
                </div>
                <button onclick="scrollToQuote()" class="gold-gradient px-6 py-3 rounded-xl font-bold text-sm shadow-lg">
                    Cotizar Ahora
                </button>
            </div>
        </section>

        <!-- Quote/Lead Form -->
        <section id="quote-section" class="glass-card p-6 space-y-6 shadow-xl">
            <h2 class="text-xl font-bold text-white flex items-center gap-2">
                <i class="fas fa-user-tie text-yellow-500"></i> Registro de Lead
            </h2>
            
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-xs font-medium text-gray-400 ml-1 uppercase tracking-wider">Empresa / Nombre</label>
                    <input type="text" id="lead-name" placeholder="Ej: Gonzalo Rojas" class="input-field text-white">
                </div>
                
                <div class="space-y-1">
                    <label class="text-xs font-medium text-gray-400 ml-1 uppercase tracking-wider">WhatsApp</label>
                    <input type="tel" id="lead-phone" placeholder="+56 9 ..." class="input-field text-white">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-gray-400 ml-1 uppercase tracking-wider">Servicio de Interés</label>
                    <div id="selected-summary" class="text-sm font-medium text-yellow-500 bg-yellow-500/10 p-3 rounded-lg border border-yellow-500/20">
                        Selecciona servicios arriba
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-medium text-gray-400 ml-1 uppercase tracking-wider">Mensaje / Notas</label>
                    <textarea id="lead-notes" rows="3" placeholder="Detalles de tu proyecto..." class="input-field text-white resize-none"></textarea>
                </div>

                <div id="apps-script-msg" class="bg-red-500/10 border border-red-500/20 p-3 rounded-lg hidden">
                    <p class="text-xs text-red-400 flex items-center gap-2">
                        <i class="fas fa-exclamation-triangle"></i> Configura Apps Script en sección Cotización
                    </p>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="saveLead()" class="flex-1 gold-gradient py-4 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2">
                        <i class="fas fa-save"></i> Guardar Lead
                    </button>
                    <button onclick="resetForm()" class="px-6 py-4 border border-slate-700 rounded-xl font-medium text-gray-400 hover:bg-slate-800 transition-colors">
                        Cancelar
                    </button>
                </div>
            </div>
        </section>

        <!-- WhatsApp Direct -->
        <button onclick="sendToWhatsApp()" class="w-full bg-[#25D366] hover:bg-[#128C7E] text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-xl transition-all mb-8">
            <i class="fab fa-whatsapp text-2xl"></i> Hablar con un Experto
        </button>

        <footer class="text-center text-gray-500 text-[10px] pb-8 uppercase tracking-[0.2em] font-medium">
            MERLINSMKT SPA · San Miguel · Santiago, Chile
        </footer>
    </div>

    <script>
        const services = [
            { id: 'web', name: 'TikTok Shop Setup', price: 120000, icon: 'fab fa-tiktok' },
            { id: 'ads', name: 'Campañas Meta/Google', price: 150000, icon: 'fas fa-ad' },
            { id: 'social', name: 'Gestión Redes Pro', price: 250000, icon: 'fas fa-share-nodes' },
            { id: 'brand', name: 'Branding Completo', price: 180000, icon: 'fas fa-palette' },
            { id: 'legal', name: 'Asesoría Legal Web', price: 90000, icon: 'fas fa-gavel' }
        ];

        let selected = new Set();
        const APPS_SCRIPT_URL = ""; 

        function renderServices() {
            const grid = document.getElementById('services-grid');
            grid.innerHTML = services.map(s => `
                <div onclick="toggleService('${s.id}')" id="card-${s.id}" class="glass-card service-card p-4 flex items-center justify-between cursor-pointer border border-transparent">
                    <div class="flex items-center gap-4">
                        <div class="h-10 w-10 rounded-xl bg-slate-800 flex items-center justify-center text-yellow-500">
                            <i class="${s.icon} text-lg"></i>
                        </div>
                        <div>
                            <p class="font-semibold text-sm text-white">${s.name}</p>
                            <p class="text-xs text-gray-400">$${s.price.toLocaleString('es-CL')}</p>
                        </div>
                    </div>
                    <div class="h-6 w-6 rounded-full border-2 border-slate-700 flex items-center justify-center" id="check-${s.id}">
                        <div class="h-3 w-3 rounded-full bg-yellow-500 hidden" id="dot-${s.id}"></div>
                    </div>
                </div>
            `).join('');
        }

        function toggleService(id) {
            const card = document.getElementById('card-' + id);
            const dot = document.getElementById('dot-' + id);
            const check = document.getElementById('check-' + id);

            if (selected.has(id)) {
                selected.delete(id);
                card.classList.remove('selected', 'border-yellow-500');
                dot.classList.add('hidden');
                check.classList.remove('border-yellow-500');
            } else {
                selected.add(id);
                card.classList.add('selected', 'border-yellow-500');
                dot.classList.remove('hidden');
                check.classList.add('border-yellow-500');
            }
            updateCalculator();
        }

        function updateCalculator() {
            let total = 0;
            let names = [];
            selected.forEach(id => {
                const s = services.find(item => item.id === id);
                total += s.price;
                names.push(s.name);
            });
            
            document.getElementById('total-display').innerText = '$' + total.toLocaleString('es-CL');
            document.getElementById('selected-summary').innerText = names.length > 0 ? names.join(', ') : 'Selecciona servicios arriba';
        }

        function scrollToQuote() {
            document.getElementById('quote-section').scrollIntoView({ behavior: 'smooth' });
        }

        function saveLead() {
            const name = document.getElementById('lead-name').value;
            const phone = document.getElementById('lead-phone').value;
            const notes = document.getElementById('lead-notes').value;
            const total = document.getElementById('total-display').innerText;
            const serviceList = document.getElementById('selected-summary').innerText;

            if (!name || !phone) {
                alert('Por favor completa nombre y teléfono');
                return;
            }

            if (!APPS_SCRIPT_URL) {
                document.getElementById('apps-script-msg').classList.remove('hidden');
            }

            const data = { name, phone, notes, total, services: serviceList, date: new Date().toLocaleString() };
            console.log('Lead Capturado:', data);
            
            setTimeout(() => {
                alert('¡Lead Guardado con éxito! (Simulado)');
            }, 500);
        }

        function sendToWhatsApp() {
            const name = document.getElementById('lead-name').value || 'Cliente Interesado';
            const servicesText = document.getElementById('selected-summary').innerText;
            const total = document.getElementById('total-display').innerText;
            
            const text = 'Hola MERLINSMKT, mi nombre es *' + name + '*.
Quiero cotizar:
*Servicios:* ' + servicesText + '
*Presupuesto:* ' + total;
            window.open('https://wa.me/56993663399?text=' + encodeURIComponent(text), '_blank');
        }

        function resetForm() {
            selected.clear();
            renderServices();
            updateCalculator();
            document.getElementById('lead-name').value = '';
            document.getElementById('lead-phone').value = '';
            document.getElementById('lead-notes').value = '';
            document.getElementById('apps-script-msg').classList.add('hidden');
        }

        renderServices();
    </script>
</body>
</html>
